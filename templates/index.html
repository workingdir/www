<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cwd</title>
  <meta name="description" content="cwd — the home directory for everything I make.">
  <link rel="icon" href="/assets/favicon.svg">
  <link rel="stylesheet" href="/assets/style.css">
</head>
<body>
  <svg class="bg" id="bg" preserveAspectRatio="none" aria-hidden="true"></svg>

  <div class="page">
    <header>
      <span class="mark">cwd<span class="cur"></span></span>
      {% if env != "production" %}<span class="env">[{{ env }}]</span>{% endif %}
    </header>

    <main>
      <div class="prose">{{ body|safe }}</div>
    </main>

    <footer>
      <span class="who"><b>Working Directory Ltd</b> · trading as cwd</span>
      <a href="https://cwd.dev">cwd.dev</a>
    </footer>
  </div>

  <script src="/assets/bg.js" defer></script>
</body>
</html>
