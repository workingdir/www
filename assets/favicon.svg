<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="cwd">
  <!-- The cwd mark: "./" — Unix for "the current directory". A blue prompt dot
       and a paper slash with flat-cut terminals (Space Mono), on an ink chip.
       Drawn on the 32 grid so it stays crisp down to 16px. -->
  <rect width="32" height="32" rx="7" fill="#1A1714"/>
  <circle cx="10" cy="20.5" r="3.3" fill="#1E22E6"/>
  <path d="M20 8.5 25.5 8.5 19.5 23.5 14 23.5 Z" fill="#EDEAE3"/>
</svg>
