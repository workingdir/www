<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="cwd">
  <!-- The cwd mark: "./" — Unix for "the current directory". A blue prompt dot
       and a slash with flat-cut terminals (Space Mono), on a chip that follows
       the OS theme: ink at night, paper by day. Drawn on the 32 grid. -->
  <style>
    :root { --chip: #0C0E17; --slash: #EDEAE3; }
    @media (prefers-color-scheme: light) {
      :root { --chip: #EDEAE3; --slash: #1A1714; }
    }
  </style>
  <rect width="32" height="32" rx="7" fill="var(--chip)"/>
  <circle cx="10" cy="20.5" r="3.3" fill="#1E22E6"/>
  <path d="M20 8.5 25.5 8.5 19.5 23.5 14 23.5 Z" fill="var(--slash)"/>
</svg>
